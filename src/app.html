<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<meta name="google-site-verification" content="gpxs77yuoRdqXZvW9OGmmmvzxO_sdlRlsyIeV6tm7fM" />

		<!-- Theme init — prevents FOUC -->
		<script>
			(function() {
				var t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
				}
				if (/Mac|iPhone|iPad|iPod/.test(navigator.platform)) {
					document.documentElement.dataset.platform = 'mac';
				}
			})();
		</script>

		<!-- RSS discovery -->
		<link rel="alternate" type="application/rss+xml" title="블로그 RSS" href="/rss.xml" />

		<!-- Pretendard 폰트 프리로드 -->
		<link
			rel="preload"
			href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
			as="style"
			onload="this.onload=null;this.rel='stylesheet'"
		/>
		<noscript>
			<link
				rel="stylesheet"
				href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
			/>
		</noscript>

		%sveltekit.head%

		<!-- Cloudflare Web Analytics -->
		<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "bcda13e95d524256b6f77201f20cef05"}'></script>

		<!-- Google Ads (AdSense) -->
		<!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ADSENSE_CLIENT_ID" crossorigin="anonymous"></script> -->
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
